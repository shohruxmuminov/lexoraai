name: lexora_ai
description: Lexora AI – Ultimate AI Dictionary & Language Learning Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.4

  # Networking (used for dictionary API + OpenAI REST)
  dio: ^5.4.3+1

  # UI / fonts / charts / animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0

  # Speech & text-to-speech
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2

  # Utilities
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
